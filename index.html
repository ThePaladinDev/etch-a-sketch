<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- normalize -->
    <link rel="stylesheet" href="./normalize.css" />
    <!-- default -->
    <link rel="stylesheet" href="./default.css" />
    <!-- main.css -->
    <link rel="stylesheet" href="./main.css" />
    <!-- app.js -->
    <script type="module" src="./app.js"></script>
    <title>Etch-a-Sketch</title>
  </head>
  <body>
    <main class="page">
      <!-- Title -->
      <section class="title">
        <h1>Etch-a-Sketch!</h1>
        <div class="title-underline"></div>
      </section>
      <!-- Board -->
      <section class="board"></section>
      <!-- Controls -->
      <section class="controls">
        <div class="reset-control">
          <button type="button" class="btn" id="reset-btn">Reset</button>
        </div>
        <div class="resize-control">
          <button type="button" class="btn" id="decrease-btn">-</button>
          <button type="button" class="btn" id="default-btn">
            <span id="current-size-info">3 x 3</span>
          </button>
          <button type="button" class="btn" id="increase-btn">+</button>
        </div>
      </section>
    </main>
  </body>
</html>
